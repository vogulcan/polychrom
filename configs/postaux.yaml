# Post-auxin -- Pol II DEPLETED (transcription off) + LOWER CTCF enrichment (0.6,
# down from pre-auxin 0.7). Models the degron experiment: less CTCF at
# boundaries, yet (per Micro-C) stronger TADs + stripes, because removing Pol II
# frees cohesin to reach CTCF anchors (longer loops, corner dots, CTCF stripes).
lef:
  chain_length: 10000
  num_chains: 1
  separation: 240
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 60000
  chunk_size: 50
  seed: 1001
  max_rnapii: 0

  topology_kwargs:
    tad_positions: [400, 900, 1500, 2200, 3000, 3400, 3900, 4500, 5200, 6000, 6400, 6900, 7500, 8200, 9000, 9500]
    # Per-anchor CTCF strength (LOWER enrichment, was 0.7 pre-auxin), keyed by
    # chain-relative boundary position (0 + chain end + each tad_positions value).
    # Tune any anchor on its own; positions left out use default_boundary_strength.
    boundary_strength:
      0:     0.6
      400:   0.6
      900:   0.6
      1500:  0.6
      2200:  0.6
      3000:  0.6
      3400:  0.6
      3900:  0.6
      4500:  0.6
      5200:  0.6
      6000:  0.6
      6400:  0.6
      6900:  0.6
      7500:  0.6
      8200:  0.6
      9000:  0.6
      9500:  0.6
      10000: 0.6
    default_boundary_strength: 0.6
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.20
    rnapii_push_prob: 0.30
    rnapii_headon_push_prob: 0.05
    rnapii_poised_block_prob: 0.5
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.8
    rnapii_terminating_block_prob: 0.95
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.2
    loading_window: 2
    target_enhancers: true
    target_tss: true
    lesion_prob: 0.0
    lesion_lifetime: 300
    lesion_block_prob: 0.95
    lesion_max: 64
    genes:
      - {tss: 140, tes: 260, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 80, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 575, tes: 725, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 500, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 1110, tes: 1290, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 1020, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 1745, tes: 1955, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 1640, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 2480, tes: 2720, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 2360, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 3140, tes: 3260, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 3080, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 3575, tes: 3725, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 3500, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 4110, tes: 4290, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 4020, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 4745, tes: 4955, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 4640, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 5480, tes: 5720, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 5360, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 6140, tes: 6260, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 6080, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 6575, tes: 6725, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 6500, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 7110, tes: 7290, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 7020, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 7745, tes: 7955, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 7640, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 8480, tes: 8720, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 8360, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 9175, tes: 9325, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 9100, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 9675, tes: 9825, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 9600, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}

  plugins:
    topology:    polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        null
    rnapii_translocate: null
    lesion:             polychrom.pipelines.loop_extrusion.plugins.lesions:update_lesions

viewer:
  max_frames: 10000
  bridge_cost: 1.0
  insulation_score_window: 150
  site_start: 0
  site_end: 10000

polymer:
  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001
  density: 0.2
  pbc: false
  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200
  initial_relaxation_steps: 1000000
  pre_recording_steps: 300000
  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs:
          - [80, 140]
          - [500, 575]
          - [1020, 1110]
          - [1640, 1745]
          - [2360, 2480]
          - [3080, 3140]
          - [3500, 3575]
          - [4020, 4110]
          - [4640, 4745]
          - [5360, 5480]
          - [6080, 6140]
          - [6500, 6575]
          - [7020, 7110]
          - [7640, 7745]
          - [8360, 8480]
          - [9100, 9175]
          - [9600, 9675]
        selective_attraction_energy: 0.0
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 10000
  cutoff: 2.0
  num_processes: 12
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
