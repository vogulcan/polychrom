lef:
  chain_length: 5000
  num_chains: 10
  separation: 240
  lifetime: 188
  lifetime_stalled: 188
  lifetime_ctcf: 752
  tick_seconds: 8
  warmup_steps: 25000
  trajectory_length: 20000
  chunk_size: 50
  seed: 42
  max_rnapii: 0

  topology_kwargs:
    tads:
      - {left: 0, right: 709, left_strength: 0.13, right_strength: 0.30}
      - {left: 710, right: 1631, left_strength: 0.30, right_strength: 0.36}
      - {left: 1632, right: 2437, left_strength: 0.36, right_strength: 0.36}
      - {left: 2438, right: 3048, left_strength: 0.36, right_strength: 0.39}
      - {left: 3049, right: 3532, left_strength: 0.39, right_strength: 0.36}
      - {left: 3533, right: 4516, left_strength: 0.36, right_strength: 0.27}
      - {left: 4517, right: 4999, left_strength: 0.27, right_strength: 0.13}
    default_boundary_strength: 0.13
    release_prob: 0.0
    include_chromosome_ends: true
    # Paper-calibrated: RNAP is a permeable moving barrier (Banigan), not a fast
    # cohesin-eviction state. Keep RNAP-stalled cohesin at the base lifetime.
    lifetime_rnapii_stalled: 188
    rnapii_stall_prob: 0.0
    rnapii_stride: 1
    # Banigan moving barrier: head-on RNAP pushes cohesin where geometry allows;
    # co-directional encounters are slowed/follow until RNAP vacates or bypasses.
    rnapii_push_prob: 0.0
    rnapii_headon_push_prob: 1.0
    rnapii_pause_cohesin_restraint: 0.3
    rnapii_pause_restraint_window: 1
    rnapii_poised_block_prob: 0.923
    rnapii_paused_block_prob: 0.923
    rnapii_elongating_block_prob: 0.923
    rnapii_terminating_block_prob: 0.923
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.02
    loading_window: 1
    target_enhancers: true     # keep: enhancer/NIPBL loading (Kagey 2010; Fursova 2024)
    target_tss: false          # Banigan 2023: no preferential TSS loading (artifact)
    weight_loading_by_activity: true
    lesion_spacing: 10              # steady-state lesions = num_sites // spacing
    lesion_type_a_prob: 0.25      # P(Type A | in a gene body); off-gene always Type B
    lesion_prerecognition_ticks: 150   # ~1200s mean at an average-sized TAD
    lesion_repair_ticks: 38            # ~300s mean at an average-sized TAD
    lesion_block_prob: 0.97      # per-tick prob a stalling lesion blocks a cohesin leg
    lesion_tad_size_exponent: 1.0   # L_TAD**(-alpha): shorter TADs carry MORE lesions
    lesion_tad_repair_exponent: 1.0 # (L_mean/L_TAD)**beta: shorter TADs recognise/repair FASTER
    lesion_type_b_enabled: false  # false -> only Type-A lesions kept (Type-A count unchanged, no backfill)
    genes:
      - {tss: 705, tes: 670, load_prob: 0.008, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.6274, pause_release_prob: 0.0286, elongation_step_prob: 0.8, pause_offset: 0, termination_prob: 0.0159}
