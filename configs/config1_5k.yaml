lef:
  chain_length: 5000
  num_chains: 10
  separation: 240
  lifetime: 188
  lifetime_stalled: 188
  lifetime_ctcf: 752 # Cohesin lifetime when its captured by a CTCF site (boosted from the base lifetime)
  tick_seconds: 8
  warmup_steps: 10000
  trajectory_length: 20000
  chunk_size: 50
  seed: 42
  max_rnapii: 6666

  topology_kwargs:
    tads:
      - {left: 0, right: 1308, left_strength: 0.13, right_strength: 0.13}
      - {left: 1309, right: 1848, left_strength: 0.13, right_strength: 0.13}
      - {left: 1849, right: 2623, left_strength: 0.13, right_strength: 0.09}
      - {left: 2624, right: 3410, left_strength: 0.09, right_strength: 0.09}
      - {left: 3411, right: 4305, left_strength: 0.09, right_strength: 0.10}
      - {left: 4306, right: 4999, left_strength: 0.10, right_strength: 0.13}
    default_boundary_strength: 0.13
    release_prob: 0.0
    include_chromosome_ends: true
    # Paper-calibrated: RNAP is a permeable moving barrier (Banigan), NOT a fast
    # cohesin-eviction state. Keep RNAP-stalled cohesin at the base lifetime -- a
    # SHORT eviction lifetime makes transcription DEPLETE (not accumulate) cohesin
    # at genes, the opposite of the Banigan moving-barrier effect (verified in 1D).
    lifetime_rnapii_stalled: 188
    rnapii_stride: 1
    # Banigan moving barrier (per-encounter probs, tick-independent): elongating RNAP
    # wins head-on and pushes the converging cohesin; co-directional contact mostly
    # only slows cohesin. stall_prob is an intrinsic floor (effective head-on push ~0.72).
    rnapii_stall_prob: 0.15
    rnapii_push_prob: 0.2
    rnapii_headon_push_prob: 0.85
    rnapii_pause_cohesin_restraint: 0.3
    rnapii_pause_restraint_window: 1
    # Per-tick cohesin bypass of a Pol II barrier (tbypass ~100 s -> k ~0.01/s, Banigan).
    # POISED pre-initiation Pol II is a LEAKY barrier (cohesin bypasses ~8x faster);
    # paused / elongating / terminating Pol II are strong barriers.
    rnapii_poised_block_prob: 0.513
    rnapii_paused_block_prob: 0.923
    rnapii_elongating_block_prob: 0.923
    rnapii_terminating_block_prob: 0.923
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.0
    loading_window: 1
    target_enhancers: false
    target_tss: false
    weight_loading_by_activity: false
    lesion_spacing: 0            # lesions off (config1/2/3)
    genes:
      - {tss: 1296, tes: 1091, load_prob: 0.01937, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.3031, pause_release_prob: 0.0453, elongation_step_prob: 0.32, pause_offset: 1, termination_prob: 0.0444}
      - {tss: 228, tes: 1028, load_prob: 0.00036, requires_enhancer: true, load_requires_enhancer: true, enhancers: [195], enhancer_logic: additive, initiation_prob: 0.254, pause_release_prob: 0.0154, elongation_step_prob: 0.32, pause_offset: 1, termination_prob: 0.0444}
      - {tss: 30, tes: 160, load_prob: 0.0119, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.2816, pause_release_prob: 0.0338, elongation_step_prob: 0.32, pause_offset: 1, termination_prob: 0.0444}
