# Pre-auxin -- regular (dense) transcription, HIGH CTCF enrichment (0.7).
# Auxin family models a Pol II degron: pre = Pol II present, post = depleted.
# Dense transcription (10 genes, 2 per TAD) so Pol II strongly diverts cohesin
# from CTCF anchors -> pre-auxin TADs are softened despite high CTCF.
lef:
  chain_length: 800
  num_chains: 1
  separation: 100
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 60000
  chunk_size: 50
  seed: 1001
  max_rnapii: 256

  topology_kwargs:
    tad_positions: [160, 320, 480, 640]
    boundary_strength: 0.7        # HIGH CTCF enrichment
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.20
    rnapii_push_prob: 0.30
    rnapii_headon_push_prob: 0.05
    rnapii_poised_block_prob: 0.5
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.8
    rnapii_terminating_block_prob: 0.95
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.2
    loading_window: 2
    target_enhancers: true
    target_tss: true
    lesion_prob: 0.0
    lesion_lifetime: 300
    lesion_block_prob: 0.95
    lesion_max: 64
    genes:
      - {tss: 30,  tes: 70,  load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 100, tes: 140, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 190, tes: 230, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 260, tes: 300, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 350, tes: 390, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 420, tes: 460, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 510, tes: 550, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 580, tes: 620, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 670, tes: 710, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 740, tes: 780, load_prob: 0.06, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}

  plugins:
    topology:    polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii
    lesion:             polychrom.pipelines.loop_extrusion.plugins.lesions:update_lesions

viewer:
  max_frames: 10000
  bridge_cost: 1.0
  insulation_score_window: 50
  site_start: 0
  site_end: 800

polymer:
  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001
  density: 0.2
  pbc: false
  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200
  initial_relaxation_steps: 500000
  pre_recording_steps: 100000
  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs: []
        selective_attraction_energy: 0.0
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 800
  cutoff: 2.0
  num_processes: 36
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
