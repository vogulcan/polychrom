# Biophysically-motivated topology (1 lattice site = 1 kb, mammalian-like).
#
# Design rationale (see references in commit message / docs):
#   * 4 Mb region (4000 sites) x 2 replicate chains for contact statistics.
#   * 7 TADs of VARIED size 300-800 kb (real TADs ~0.1-1 Mb, median ~0.5-1 Mb;
#     loop/sub-domains ~185 kb). Sizes: 350/600/300/800/450/800/700 kb.
#   * TAD boundaries = CONVERGENT CTCF anchors (inward-facing), strong
#     (capture 0.9) except a weaker sub-TAD boundary at 1250 (0.6).
#   * Exactly ONE regulated enhancer-promoter gene per TAD. Enhancer AND its
#     target promoter sit INSIDE the same TAD, >=50 kb from any boundary, so
#     E-P communication is intra-TAD (boundaries insulate cross-TAD contacts).
#   * E-P genomic distances span 80-500 kb (median ~220 kb), matching the
#     real enhancer-promoter distance distribution.
#   * Gene bodies 60-130 kb; both + and - strand genes (TSS->TES direction).
lef:
  chain_length: 4000           # 4 Mb at 1 kb/site
  num_chains: 2
  separation: 200              # ~1 cohesin per 200 kb (Rao 2014 ~1 loop/185 kb)
  lifetime: 200
  lifetime_stalled: 200
  warmup_steps: 10000
  trajectory_length: 30000
  chunk_size: 50
  seed: 1001
  max_rnapii: 128              # transcription ON

  topology_kwargs:
    # Inner TAD boundaries (chain-relative). Boundaries at 0 + these + 4000.
    tad_positions: [350, 950, 1250, 2050, 2500, 3300]
    # Per-anchor CTCF strength keyed by chain-relative boundary position.
    # Strong insulating boundaries (0.9); 1250 is a weaker sub-TAD boundary.
    boundary_strength:
      0:    0.9
      350:  0.9
      950:  0.9
      1250: 0.6
      2050: 0.9
      2500: 0.9
      3300: 0.9
      4000: 0.9
    default_boundary_strength: 0.9
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.20
    rnapii_push_prob: 0.30
    rnapii_headon_push_prob: 0.05
    rnapii_poised_block_prob: 0.5
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.8
    rnapii_terminating_block_prob: 0.95
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.0
    loading_window: 2
    target_enhancers: true
    target_tss: true
    lesion_prob: 0.0
    # One E-P gene per TAD. (enhancer, TSS) both inside the TAD, >=50 kb from
    # boundary; E-P distance noted per line. + / - strand alternated.
    genes:
      # TAD0 [0,350]    +strand, gene 80 kb, E-P 100 kb
      - {tss: 180,  tes: 260,  load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 80,   initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD1 [350,950]  -strand, gene 140 kb, E-P 150 kb
      - {tss: 700,  tes: 560,  load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 850,  initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD2 [950,1250] +strand, gene 60 kb, E-P 80 kb (small sub-TAD)
      - {tss: 1100, tes: 1160, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 1020, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD3 [1250,2050] +strand, gene 100 kb. SHADOW-ENHANCER gene: three
      # redundant enhancers (1350/1500/1700) all inside the TAD regulate one
      # promoter (TSS 1850). enhancer_logic: additive -> output scales with the
      # number of enhancers in E-P contact (Bothma/Levo eLife 2015 baseline).
      - {tss: 1850, tes: 1950, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancers: [1350, 1500, 1700], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD4 [2050,2500] -strand, gene 80 kb, E-P 220 kb
      - {tss: 2200, tes: 2120, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 2420, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD5 [2500,3300] +strand, gene 130 kb, E-P 450 kb
      - {tss: 3050, tes: 3180, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 2600, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      # TAD6 [3300,4000] -strand, gene 80 kb, E-P 370 kb
      - {tss: 3550, tes: 3470, load_prob: 0.05, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 3920, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}

  plugins:
    topology:    polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii

viewer:
  max_frames: 1000
  bridge_cost: 1.0
  insulation_score_window: 200    # ~ smallest TAD scale
  site_start: 0
  site_end: 4000

polymer:
  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001
  density: 0.2
  pbc: false
  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200
  initial_relaxation_steps: 1000000
  pre_recording_steps: 300000
  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs:
          - [80, 180]
          - [850, 700]
          - [1020, 1100]
          - [1350, 1850]      # TAD3 shadow-enhancer gene: 3 enhancers -> 1 promoter
          - [1500, 1850]
          - [1700, 1850]
          - [2420, 2200]
          - [2600, 3050]
          - [3920, 3550]
        selective_attraction_energy: 1.0
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 4000
  cutoff: 2.0
  num_processes: 12
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
