lef:
  chain_length: 10000
  num_chains: 20
  separation: 240
  lifetime: 150
  lifetime_stalled: 150
  lifetime_ctcf: 600 # Cohesin lifetime when its captured by a CTCF site (boosted from the base lifetime)
  tick_seconds: 8
  warmup_steps: 10000
  trajectory_length: 20000
  chunk_size: 50
  seed: 42
  max_rnapii: 0

  topology_kwargs:
    tads:
      - {left: 0, right: 1864, left_strength: 0.15, right_strength: 0.28}
      - {left: 1865, right: 3060, left_strength: 0.28, right_strength: 0.32}
      - {left: 3061, right: 4176, left_strength: 0.32, right_strength: 0.32}
      - {left: 4177, right: 5321, left_strength: 0.32, right_strength: 0.45}
      - {left: 5322, right: 6171, left_strength: 0.45, right_strength: 0.43}
      - {left: 6172, right: 6680, left_strength: 0.43, right_strength: 0.45}
      - {left: 6681, right: 7229, left_strength: 0.45, right_strength: 0.38}
      - {left: 7230, right: 8421, left_strength: 0.38, right_strength: 0.32}
      - {left: 8422, right: 9448, left_strength: 0.32, right_strength: 0.38}
      - {left: 9449, right: 9999, left_strength: 0.38, right_strength: 0.15}
    default_boundary_strength: 0.15
    release_prob: 0.0
    include_chromosome_ends: true
    # Paper-calibrated: RNAP is a permeable moving barrier (Banigan), NOT a fast
    # cohesin-eviction state. Keep RNAP-stalled cohesin at the base lifetime -- a
    # SHORT eviction lifetime makes transcription DEPLETE (not accumulate) cohesin
    # at genes, the opposite of the Banigan moving-barrier effect (verified in 1D).
    lifetime_rnapii_stalled: 150
    rnapii_stride: 1
    # Decelerated step prob for a Pol crawling the per-gene 3' termination window (Schwalb 2016
    # window median ~3.3 kb; Cortazar 2019 3' rate ~0.7-0.9 kb/min). Vacates the TES quickly so
    # the 3' end stops capping output at 1/dwell (which packed long active gene bodies solid).
    rnapii_termination_step_prob: 0.136
    # Banigan moving barrier (per-encounter probs, tick-independent): elongating RNAP
    # wins head-on and pushes the converging cohesin; co-directional contact mostly
    # only slows cohesin. stall_prob is an intrinsic floor (effective head-on push ~0.72).
    rnapii_stall_prob: 0.0
    rnapii_push_prob: 0.0
    rnapii_headon_push_prob: 1.0
    rnapii_pause_cohesin_restraint: 1.0
    rnapii_pause_restraint_window: 1
    # Promoter-proximal premature termination as a per-tick channel competing with
    # productive release (pause_release_prob): single-Pol pause dwell ~0.4-0.5 min
    # (Lysakovskaia 2025), productive fraction ~0.1-0.25 (activity-dependent).
    rnapii_pause_term_prob: 0.1813
    # Per-tick cohesin bypass of a Pol II barrier (tbypass ~100 s -> k ~0.01/s, Banigan).
    # pre-initiation Pol II is a LEAKY barrier (cohesin bypasses ~8x faster);
    # paused / elongating / terminating Pol II are strong barriers.
    rnapii_pre_initiation_block_prob: 0.513
    rnapii_paused_block_prob: 0.923
    rnapii_elongating_block_prob: 0.923
    rnapii_terminating_block_prob: 0.923
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.0
    loading_window: 1
    target_enhancers: false
    target_tss: false
    weight_loading_by_activity: false
    lesion_spacing: 10              # steady-state lesions = num_sites // spacing
    lesion_type_a_prob: 0.25      # P(Type A | in a gene body); off-gene always Type B
    lesion_prerecognition_ticks: 300   # ~2400s mean at an average-sized TAD
    lesion_repair_ticks: 45            # ~360s mean at an average-sized TAD
    lesion_block_prob: 0.97      # per-tick prob a stalling lesion blocks a cohesin leg
    lesion_tad_size_exponent: 1.0   # L_TAD**(-alpha): shorter TADs carry MORE lesions
    lesion_tad_repair_exponent: 0.25 # (L_mean/L_TAD)**beta: shorter TADs recognise/repair FASTER
    lesion_type_b_enabled: true  # false -> only Type-A lesions kept (Type-A count unchanged, no backfill)
    genes:
      - {tss: 1860, tes: 1824, load_prob: 0.49338, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.2686, pause_release_prob: 0.0841, elongation_step_prob: 0.424, pause_offset: 1, termination_prob: 0.0545, termination_window: 1, pause_term_prob: 0.1479, gene_class: hk_const}
