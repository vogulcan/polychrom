lef:
  chain_length: 2500
  num_chains: 10
  separation: 240
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 10000
  chunk_size: 50
  seed: 1001
  max_rnapii: 2048
  output_path: /home/carlos/Clone/polychrom/runs/control_v2/LEFPositions.h5

  topology_kwargs:
    tad_positions: [500, 1000, 1500, 2000]
    boundary_strength: 0.5
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.4
    rnapii_push_prob: 0.25
    rnapii_poised_block_prob: 0.80
    rnapii_paused_block_prob: 0.99
    rnapii_elongating_block_prob: 0.99
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    genes:
      - {tss: 650,  tes: 710,  load_prob: 0.05, requires_enhancer: true,
         enhancer_pos: 940,
         initiation_prob: 1.0, pause_release_prob: 1.0,
         elongation_step_prob: 0.2, pause_offset: 0}
      - {tss: 920,  tes: 850,  load_prob: 0.05, requires_enhancer: true,
         enhancer_pos: 540,
         initiation_prob: 1.0, pause_release_prob: 1.0,
         elongation_step_prob: 0.2, pause_offset: 0}
      - {tss: 1740,  tes: 1810,  load_prob: 0.05, requires_enhancer: true,
         enhancer_pos: 1560,
         initiation_prob: 1.0, pause_release_prob: 1.0,
         elongation_step_prob: 0.2, pause_offset: 0}
      - {tss: 1980,  tes: 1900,  load_prob: 0.05, requires_enhancer: true,
         enhancer_pos: 1880,
         initiation_prob: 1.0, pause_release_prob: 1.0,
         elongation_step_prob: 0.2, pause_offset: 0}

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii

viewer:
  lef_positions_path: /home/carlos/Clone/polychrom/runs/control_v2/LEFPositions.h5
  output_path: /home/carlos/Clone/polychrom/runs/control_v2/bridging_viewer.html
  max_frames: 500
  bridge_cost: 1.0
  insulation_score_window: 50
  site_start: 0
  site_end: 2500

polymer:
  lef_positions_path: /home/carlos/Clone/polychrom/runs/control_v2/LEFPositions.h5
  output_folder: /home/carlos/Clone/polychrom/runs/control_v2

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001

  density: 0.2
  pbc: false

  # 1 kb lattice, 0.0063 s / MD step, 2 kb total loop growth per LEF tick
  # -> ~125 bp/s total cohesin extrusion.
  md_steps_per_block: 2540
  save_every_blocks: 10
  restart_every_blocks: 200

  initial_relaxation_steps: 500000
  pre_recording_steps: 100000

  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs:
          - [940, 650]
          - [540, 920]
          - [1560, 1740]
          - [1880, 1980]
        selective_attraction_energy: 1.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: /home/carlos/Clone/polychrom/runs/control_v2
  raw_output_path: /home/carlos/Clone/polychrom/runs/control_v2/contact_map.npy
  oe_output_path: /home/carlos/Clone/polychrom/runs/control_v2/contact_map_oe.npy
  viz_output_path: /home/carlos/Clone/polychrom/runs/control_v2/contact_map_oe.png
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 2500
  cutoff: 5.0
  num_processes: 36
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        
