# Config 4 -- Config 3 (tx off + strong boundaries) + LESIONS (UV damage).
# Lesions occur in gene bodies, are repaired after lesion_lifetime, and stall
# cohesin (lesion_block_prob) -> asymmetric extrusion. tx is off, so lesions
# act purely as cohesin barriers (no Pol II to lesion-stall) = full post-UV state.
lef:
  chain_length: 800
  num_chains: 1
  separation: 100
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 60000
  chunk_size: 50
  seed: 1001
  max_rnapii: 0
  output_path: /home/carlos/Clone/polychrom/runs/config4/LEFPositions.h5

  topology_kwargs:
    tad_positions: [160, 320, 480, 640]
    boundary_strength: 0.9
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.20
    rnapii_push_prob: 0.30
    rnapii_headon_push_prob: 0.05
    rnapii_poised_block_prob: 0.5
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.8
    rnapii_terminating_block_prob: 0.95
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.3
    loading_window: 2
    target_enhancers: true
    target_tss: true
    # CPDs (cyclobutane pyrimidine dimers, UV lesions) seeded at every
    # `lesion_spacing` monomer in each gene body -- ~34 lesions total for
    # 5 genes of body lengths 50-70 kb. Lifetime is set very large so they
    # persist for the whole trajectory (a single UV-pulse damage state).
    # Stochastic occurrence (lesion_prob) is off.
    lesion_prob: 0.0
    lesion_lifetime: 1000000      # effectively permanent over the 60k-tick run
    lesion_block_prob: 0.95
    lesion_max: 128               # comfortable cap for the seeded set
    lesion_spacing: 10            # 1 CPD per 10 monomers in each gene body
    genes:
      - {tss: 40,  tes: 90,  load_prob: 0.05, requires_enhancer: true,  load_requires_enhancer: true, enhancer_pos: 130, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 200, tes: 270, load_prob: 0.05, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1,  elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 360, tes: 410, load_prob: 0.05, requires_enhancer: true,  load_requires_enhancer: true, enhancer_pos: 450, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 520, tes: 590, load_prob: 0.05, requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.1,  elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 680, tes: 730, load_prob: 0.05, requires_enhancer: true,  load_requires_enhancer: true, enhancer_pos: 770, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}

  plugins:
    topology:    polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        null
    rnapii_translocate: null
    lesion:             polychrom.pipelines.loop_extrusion.plugins.lesions:update_lesions

viewer:
  lef_positions_path: /home/carlos/Clone/polychrom/runs/config4/LEFPositions.h5
  output_path: /home/carlos/Clone/polychrom/runs/config4/bridging_viewer.html
  max_frames: 10000
  bridge_cost: 1.0
  insulation_score_window: 50
  site_start: 0
  site_end: 800

polymer:
  lef_positions_path: /home/carlos/Clone/polychrom/runs/config4/LEFPositions.h5
  output_folder: /home/carlos/Clone/polychrom/runs/config4
  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001
  density: 0.2
  pbc: false
  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200
  initial_relaxation_steps: 500000
  pre_recording_steps: 100000
  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs: []
        selective_attraction_energy: 0.0
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: /home/carlos/Clone/polychrom/runs/config4
  raw_output_path: /home/carlos/Clone/polychrom/runs/config4/contact_map.npy
  oe_output_path: /home/carlos/Clone/polychrom/runs/config4/contact_map_oe.npy
  viz_output_path: /home/carlos/Clone/polychrom/runs/config4/contact_map_oe.png
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 800
  cutoff: 2.0
  num_processes: 36
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
