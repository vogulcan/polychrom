lef:
  chain_length: 800
  num_chains: 1
  # 800 / 120 = 6 cohesins (~1 per 120 kb). Denser than the paper's d=240 kb so
  # a cohesin loop brackets the 250 kb E-P pair often enough for meaningful
  # E-P contact statistics in this small window. Must match postUV.yaml.
  separation: 80
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 100000
  chunk_size: 50
  seed: 1001
  max_rnapii: 128
  output_path: /home/ogulcan/polychrom/runs/preUV/LEFPositions.h5

  topology_kwargs:
    # 5 equal TADs of 160 kb: interior CTCF boundaries split [0,800] into
    # [0,160] [160,320] [320,480] [480,640] [640,800]. ~160 kb is a typical
    # mammalian TAD size.
    tad_positions: [160, 320, 480, 640]
    boundary_strength: 0.5
    release_prob: 0.0
    include_chromosome_ends: true
    # RNAPII -> cohesin collision (Pol II is the mover). Fursova & Larson 2024
    # Fig 3a: only elongating Pol II pushes cohesin, and it pushes a
    # co-directional (rear) leg far more than a head-on (converging) one.
    rnapii_stall_prob: 0.20        # intrinsic stall floor on any obstacle
    rnapii_push_prob: 0.30         # push prob, co-directional leg (rear encounter)
    rnapii_headon_push_prob: 0.05  # push prob, head-on leg (converging) -- mostly stalls
    # cohesin -> RNAPII collision (cohesin is the mover): per-tick block prob by
    # Pol II state. block_prob is re-rolled each tick, so mean dwell before a
    # cohesin bypasses ~ 1/(1-block) ticks (~8 s/tick). These values make Pol II
    # a weak-but-real, semi-permeable barrier (dwell of seconds-to-minutes, all
    # < 1.0 so cohesin still bypasses within its ~20 min residence) -- enough to
    # accumulate cohesin at TSS/TES (stripes, fountains; Fursova & Larson 2024
    # Fig 3a/4), unlike the near-transparent 0.25/0.50 used before. Paused/
    # terminating Pol II is the strongest stationary block; elongating weaker
    # (it also pushes); poised weakest. CTCF stays the only stable barrier.
    rnapii_poised_block_prob: 0.5         # dwell ~16 s
    rnapii_paused_block_prob: 0.95        # dwell ~2.7 min (strongest)
    rnapii_elongating_block_prob: 0.8     # dwell ~40 s
    rnapii_terminating_block_prob: 0.95   # terminating Pol II = stationary block at TES
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    # Targeted cohesin loading at active enhancers/TSS (NIPBL/MAU2; Fursova &
    # Larson 2024 Fig 4b). A fraction targeted_load_prob of (re)loads land within
    # +/-loading_window sites of an enhancer/TSS; the rest load uniformly.
    # This dominates how transcription shapes cohesin (fountains at load sites).
    # gene0's E-P pair is 90 kb (enh 290, prom 200) inside one 160 kb TAD, well
    # within a cohesin's ~150-site reach, so a cohesin loaded at the enhancer
    # bridges to the promoter -> targeted loading PROMOTES gene0 E-P contact
    # here (unlike a wide cross-TAD E-P, where it would loop the enhancer out).
    # Needs plugins.load = load_targeted (below).
    targeted_load_prob: 0.05
    loading_window: 2
    target_enhancers: true
    target_tss: true
    # UV lesions (DNA damage) in gene bodies. A lesion stalls elongating Pol II
    # (lesion-stalled Pol II) and stalls a cohesin leg with lesion_block_prob
    # while the other leg keeps extruding -> ASYMMETRIC extrusion. Lesions arise
    # at lesion_prob per gene per tick and are repaired after lesion_lifetime
    # ticks (~8 s/tick: 300 ticks ~ 40 min, TC-NER timescale).
    # preUV = before UV -> lesion_prob 0.0 (off). Raise for a UV/damage run.
    lesion_prob: 0.0           # per-gene per-tick occurrence (0 = no damage)
    lesion_lifetime: 300       # ticks until repair (~40 min)
    lesion_block_prob: 0.95    # per-tick cohesin stall probability at a lesion
    lesion_max: 64             # cap on simultaneous lesions
    genes:
      # Regulated, enhancer-dependent gene in TAD2 [320,480]. Promoter 325,
      # TES 350 -> 25 kb gene body (typical mammalian gene). Enhancer 440 ->
      # 115 kb E-P, both inside the same TAD (domain model). Rates tuned for a
      # biological Pol II state mix (per ~8 s/tick, 1 kb/site):
      #   initiation 0.5  -> POISED->PAUSED ~16 s (fast promoter escape)
      #   pause_release 0.02 -> promoter-proximal pause ~6.7 min (median ~7 min;
      #                          longer here as it also waits for E-P contact)
      #   elongation 0.2  -> 1.3 kb/min (real Pol II 1-4 kb/min)
      #   termination 0.08 -> terminating dwell at TES ~1.7 min (real ~1-2 min)
      - {tss: 350,  tes: 325,  load_prob: 0.04, requires_enhancer: true,
         load_requires_enhancer: true,
         enhancer_pos: 440,
         initiation_prob: 0.5, pause_release_prob: 0.02,
         elongation_step_prob: 0.2, pause_offset: 1,
         termination_prob: 0.08}
      # Genome-wide transcription: one constitutive (enhancer-independent) gene
      # per other TAD, so every TAD has Pol II diverting cohesin from its CTCF
      # anchors (the mechanism behind Pol II-depletion -> stronger TADs). Same
      # biological rates; pause_release 0.1 (no enhancer gate) -> pause ~1.3 min.
      - {tss: 50,  tes: 100, load_prob: 0.04, requires_enhancer: false,   # TAD0
         initiation_prob: 0.5, pause_release_prob: 0.1,
         elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 210, tes: 270, load_prob: 0.04, requires_enhancer: false,   # TAD1
         initiation_prob: 0.5, pause_release_prob: 0.1,
         elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 530, tes: 590, load_prob: 0.04, requires_enhancer: false,   # TAD3
         initiation_prob: 0.5, pause_release_prob: 0.1,
         elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}
      - {tss: 700, tes: 750, load_prob: 0.04, requires_enhancer: false,   # TAD4
         initiation_prob: 0.5, pause_release_prob: 0.1,
         elongation_step_prob: 0.2, pause_offset: 1, termination_prob: 0.08}

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii
    # UV-lesion dynamics (occurrence in gene bodies + stochastic repair). Active
    # only when lesion_prob > 0 (below). preUV = before UV -> off by default.
    lesion:             polychrom.pipelines.loop_extrusion.plugins.lesions:update_lesions

viewer:
  lef_positions_path: /home/ogulcan/polychrom/runs/preUV/LEFPositions.h5
  output_path: /home/ogulcan/polychrom/runs/preUV/bridging_viewer.html
  max_frames: 10000
  bridge_cost: 1.0
  insulation_score_window: 50
  site_start: 0
  site_end: 800

polymer:
  lef_positions_path: /home/ogulcan/polychrom/runs/preUV/LEFPositions.h5
  output_folder: /home/ogulcan/polychrom/runs/preUV

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001

  density: 0.2
  pbc: false

  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200

  initial_relaxation_steps: 500000
  pre_recording_steps: 100000

  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs:
          - [440, 325]
        selective_attraction_energy: 1.0
        # Pol II transcription-driven compaction (Fursova & Larson 2024, Fig 2a):
        # gene bodies of genes carrying an elongating RNAPII self-attract.
        # Strength = multiple of selective_attraction_energy (here 2 x 1.0 = 2 kT).
        # Rides on the chain-restricted nonbonded force -> no cross-chain physics.
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: /home/ogulcan/polychrom/runs/preUV
  raw_output_path: /home/ogulcan/polychrom/runs/preUV/contact_map.npy
  oe_output_path: /home/ogulcan/polychrom/runs/preUV/contact_map_oe.npy
  viz_output_path: /home/ogulcan/polychrom/runs/preUV/contact_map_oe.png
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 800
  cutoff: 2.0
  num_processes: 36
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        
