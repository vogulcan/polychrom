# Time-calibrated biophysical config (1 lattice site = 1 kb, mammalian-like).
# Descends from biophysical.yaml; the TAD/gene/E-P ARCHITECTURE is unchanged.
# What is new here is an explicit, self-consistent REAL-TIME calibration so
# that "1 tick" has a defined duration in seconds and every kinetic rate is
# grounded in measured numbers.
#
# ---------------------------------------------------------------------------
# REAL TIME PER TICK  (the core of this config)
# ---------------------------------------------------------------------------
# Pipeline coupling: 1 LEF dynamics tick == 1 MD block == md_steps_per_block
# integrator steps (polymer.py BondUpdater advances exactly one recorded LEF
# frame per block).
#
# Hansen-lab MSD calibration (Yang & Hansen 2024 Suppl. Box 1; same polychrom
# setup, same error_tol=0.01 / collision_rate=1 / density=0.2 used below):
#     * 1 lattice site            = 1 kb DNA
#     * 1 MD integrator step       ~= 0.0063 s   (calibrated from Gabriele 2022 MSD)
#     * 1 monomer                  ~= 27 nm diameter
#     * total cohesin extrusion    = 125 bp/s  (Davidson/Kim 2019; Hansen 2017)
#
# A free cohesin steps 1 kb per leg per tick => the loop grows 2 kb/tick.
# Matching the measured 125 bp/s TOTAL extrusion fixes the tick duration:
#     1 tick = 2000 bp / 125 bp/s = 16 s
#     md_steps_per_block = 16 s / 0.0063 s/step = 2540   (2540 * 0.0063 = 16.0 s)
# => **1 tick = 16 s of real time.** Pass tick_seconds=16.0 to any QC readout
#    (scripts/nascent_rna_abundance.py derives this from md_steps_per_block).
#
# ---------------------------------------------------------------------------
# RATES, converted to ticks at 16 s/tick
# ---------------------------------------------------------------------------
#   cohesin extrusion   1 kb/leg/tick                     -> 125 bp/s total (def.)
#   cohesin residence   lifetime=82 ticks * 16 s = 1312 s ~= 22 min (Hansen 2017)
#                       processivity = 2 kb/tick * 82 = 164 kb (in-vivo range)
#   PolII elongation    elongation_step_prob=0.6 site/tick (nominal 2.25 kb/min;
#                       realized ~1.9 kb/min after obstacle stalls) -- mammalian
#                       avg ~2 kb/min (Danko/Jonkers)
#   promoter pause      pause_release_prob=0.045 -> mean 22 ticks = ~6 min pause
#   initiation escape   initiation_prob=0.5 -> mean 2 ticks = 32 s POISED->PAUSED
#   TES dwell           termination_prob=0.15 -> mean 6.7 ticks = ~1.8 min
#   PolII recruitment   load_prob=0.1 (gated by E-P contact) -> attempt ~every
#                       2.7 min when the enhancer loop is engaged
#
# Nascent-RNA abundance per gene = time-mean number of ELONGATING Pol II on the
# gene body (Pol II density; the GRO/PRO-seq / 4sU observable). Measure with
# scripts/nascent_rna_abundance.py after the `lef` stage.
lef:
  chain_length: 4000           # 4 Mb at 1 kb/site
  num_chains: 1
  separation: 200              # ~1 cohesin per 200 kb (Rao 2014 ~1 loop/185 kb)
  lifetime: 82                 # 82 ticks * 16 s ~= 22 min residence (Hansen 2017)
  lifetime_stalled: 82
  warmup_steps: 10000
  trajectory_length: 100000
  chunk_size: 50
  seed: 1001
  max_rnapii: 0                # transcription OFF (RNAPII plugins nulled below)

  topology_kwargs:
    # Inner TAD boundaries (chain-relative). Boundaries at 0 + these + 4000.
    tad_positions: [350, 950, 1250, 2050, 2500, 3300]
    boundary_strength:
      0:    0.60
      350:  0.60
      950:  0.60
      1250: 0.60
      2050: 0.60
      2500: 0.60
      3300: 0.60
      4000: 0.60
    default_boundary_strength: 0.60
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.20
    rnapii_push_prob: 0.50          # elongating PolII relocalizes co-directional
                                    # cohesin downstream (Banigan&Mirny 2022 moving
                                    # barrier; Kim 2026 cohesin follows txn dir)
    rnapii_headon_push_prob: 0.05
    # Tei 2026 gatekeeper arm: a cohesin leg within 1 site of a paused Pol II
    # restrains (slows 3.3x) its pause release. Opposes the E-P activation arm;
    # on cohesin loss the restraint is relieved, compensating for lost
    # recruitment (steady-state paradox; partial upregulation of constitutive
    # genes per Kim 2026).
    rnapii_pause_cohesin_restraint: 0.3
    rnapii_pause_restraint_window: 1
    rnapii_poised_block_prob: 0.5
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.8
    rnapii_terminating_block_prob: 0.95
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    # Facilitated cohesin loading at enhancers is the mechanism of extrusion
    # FOUNTAINS (Galitsyna et al. 2026, Nat Commun s41467-026-69105-9). Their
    # polymer parameter sweep (Fig 5d,e) shows ~10-fold loading enrichment at a
    # narrow 1-kb enhancer site best fits the measured fountain intensity, while
    # 50-100x is "too strong". With 9 enhancers over 4000 sites the per-site
    # enrichment is E = 1 + p*N/(n_enh*(1-p)); p=0.02 -> ~10x (best fit).
    # Fountains form at ENHANCERS, not promoters (Fig 2d, 3b) -> target_tss false.
    targeted_load_prob: 0.02     # was 0.12 (~62x enrichment, too strong -> fountains too frequent)
    loading_window: 1            # 1-kb enhancer loading site = 1 monomer (Fig 5a)
    target_enhancers: true
    target_tss: false
    lesion_prob: 0.0
    # One gene per TAD spanning BOTH Kim et al. 2026 (NSMB) regulatory classes
    # and a realistic gene-length spread (20-240 kb; human median ~24 kb, with a
    # long developmental-gene tail):
    #   * LONG-RANGE, cohesin-dependent, cell-type-specific genes (E-P >100 kb):
    #     require E-P loop contact to fire (requires_enhancer + load_requires_
    #     enhancer). These are the genes that lose expression on RAD21 depletion.
    #   * SHORT-RANGE, cohesin-INDEPENDENT, constitutive (housekeeping-like) genes
    #     (E-P <50 kb): fire regardless of the loop (requires_enhancer: false,
    #     higher load_prob) -- insensitive to cohesin loss (Kim 2026 short loops).
    # (enhancer, TSS) sit inside the same TAD, >=~50 kb from any boundary.
    # Kinetics calibrated to 16 s/tick (see header): elongation 0.6 site/tick
    # (~2 kb/min realized), pause release 0.045 (~6 min pause), termination 0.15
    # (~1.8 min TES dwell). load_prob 0.1 (loop-gated genes) / 0.3 (constitutive).
    genes:
      # TAD0 [0,350]   +strand, SHORT 20 kb housekeeping gene, E-P 30 kb
      #   short-range, cohesin-INDEPENDENT, constitutive.
      - {tss: 120,  tes: 140,  load_prob: 0.3, requires_enhancer: false, load_requires_enhancer: false, enhancer_pos: 90,   initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD1 [350,950] -strand, 140 kb cell-specific gene, E-P 160 kb
      #   long-range, cohesin-dependent.
      - {tss: 720,  tes: 580,  load_prob: 0.1, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 880,  initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD2 [950,1250] +strand, SHORT 30 kb housekeeping gene, E-P 40 kb (sub-TAD)
      #   short-range, cohesin-INDEPENDENT, constitutive.
      - {tss: 1080, tes: 1110, load_prob: 0.3, requires_enhancer: false, load_requires_enhancer: false, enhancer_pos: 1040, initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD3 [1250,2050] +strand, VERY LONG 240 kb developmental gene. SHADOW/
      #   SUPER-ENHANCER: three redundant enhancers (1350/1500/1650) all inside
      #   the TAD regulate one promoter (TSS 1750), E-P 400/250/100 kb.
      #   enhancer_logic: additive -> output scales with #enhancers in contact
      #   (Bothma/Levo eLife 2015). Long-range, strongly cohesin-dependent.
      - {tss: 1750, tes: 1990, load_prob: 0.1, requires_enhancer: true, load_requires_enhancer: true, enhancers: [1350, 1500, 1650], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD4 [2050,2500] -strand, 50 kb cell-specific gene, E-P 140 kb
      #   long-range, cohesin-dependent.
      - {tss: 2300, tes: 2250, load_prob: 0.1, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 2440, initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD5 [2500,3300] +strand, 180 kb gene, DISTAL E-P 300 kb
      #   long-range, strongly cohesin-dependent (lowly expressed in WT).
      - {tss: 2700, tes: 2880, load_prob: 0.1, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 3000, initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}
      # TAD6 [3300,4000] -strand, 60 kb cell-specific gene, E-P 350 kb
      #   long-range, cohesin-dependent.
      - {tss: 3550, tes: 3490, load_prob: 0.1, requires_enhancer: true, load_requires_enhancer: true, enhancer_pos: 3900, initiation_prob: 0.5, pause_release_prob: 0.045, elongation_step_prob: 0.6, pause_offset: 1, termination_prob: 0.15}

  plugins:
    topology:    polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_targeted
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        null    # transcription shut down (no RNAPII loading)
    rnapii_translocate: null    # transcription shut down (no RNAPII dynamics)

viewer:
  max_frames: 1000
  bridge_cost: 1.0
  insulation_score_window: 200    # ~ smallest TAD scale
  site_start: 0
  site_end: 4000

polymer:
  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001
  density: 0.2
  pbc: false
  md_steps_per_block: 2540        # 2540 * 0.0063 s = 16.0 s real time per tick
  save_every_blocks: 10
  restart_every_blocks: 200
  initial_relaxation_steps: 500000   # Hansen Suppl: bare-polymer relax to steady state
  pre_recording_steps: 300000
  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: 1.0
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs:
          - [90, 120]         # TAD0 short-range constitutive (E-P 30 kb)
          - [880, 720]        # TAD1 long-range (E-P 160 kb)
          - [1040, 1080]      # TAD2 short-range constitutive (E-P 40 kb)
          - [1350, 1750]      # TAD3 shadow/super-enhancer: 3 enhancers -> 1 promoter
          - [1500, 1750]
          - [1650, 1750]
          - [2440, 2300]      # TAD4 long-range (E-P 140 kb)
          - [3000, 2700]      # TAD5 distal (E-P 300 kb)
          - [3900, 3550]      # TAD6 long-range (E-P 350 kb)
        selective_attraction_energy: 1.0
        polii_self_affinity: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 4000
  cutoff: 2.0
  num_processes: 12
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
