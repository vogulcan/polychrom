lef:
  chain_length: 10000
  num_chains: 4
  separation: 200              # ~1 cohesin per 200 kb (Rao 2014 ~1 loop/185 kb)
  lifetime: 150
  lifetime_stalled: 150
  lifetime_ctcf: 200
  warmup_steps: 10000
  trajectory_length: 5000
  chunk_size: 50
  seed: 42
  max_rnapii: 0

  topology_kwargs:
    tad_positions: [581, 985, 1639, 1938, 2262, 3060, 3406, 4030, 4876, 5185, 5954, 6423, 6711, 7049, 7743, 8421, 8742, 9238]
    boundary_strength:
      581: 0.60
      985: 0.60
      1639: 0.60
      1938: 0.60
      2262: 0.60
      3060: 0.60
      3406: 0.60
      4030: 0.60
      4876: 0.60
      5185: 0.60
      5954: 0.60
      6423: 0.60
      6711: 0.60
      7049: 0.60
      7743: 0.60
      8421: 0.60
      8742: 0.60
      9238: 0.60
    default_boundary_strength: 0.60
    release_prob: 0.0
    include_chromosome_ends: true
    lifetime_rnapii_stalled: 150
    rnapii_stall_prob: 0.35        # Pol intrinsically stalls ~1/3 of cohesin hits (pausing on obstacle)
    rnapii_push_prob: 0.50         # co-directional cohesin pushed (Kim 2026: cohesin follows txn; Banigan-Mirny 2022)
    rnapii_headon_push_prob: 0.02  # head-on collision stalls, not reversed (Brandao 2019; replication-txn conflict)
    rnapii_pause_cohesin_restraint: 0.3   # Tei 2026 pause-release gatekeeper (3.3x slower)
    rnapii_pause_restraint_window: 1
    rnapii_poised_block_prob: 0.5  # leaky at promoter: cohesin loads/passes POISED Pol
    rnapii_paused_block_prob: 0.95
    rnapii_elongating_block_prob: 0.95
    rnapii_terminating_block_prob: 0.95   # strong TES block -> 3' cohesin accumulation (Fursova 2024)
    ep_contact_tolerance: 1
    replicate_genes_across_chains: true
    targeted_load_prob: 0.02
    loading_window: 1
    target_enhancers: true
    target_tss: false
    lesion_prob: 0.0
    genes:
      - {tss: 362, tes: 217, load_prob: 0.06, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.15, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 601, tes: 702, load_prob: 0.06, requires_enhancer: true, load_requires_enhancer: true, enhancers: [965], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.03, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 1619, tes: 1459, load_prob: 0.06, requires_enhancer: true, load_requires_enhancer: true, enhancers: [1005, 1158, 1312], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 1751, tes: 1825, load_prob: 0.06, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 2140, tes: 2059, load_prob: 0.06, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.15, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 2282, tes: 2442, load_prob: 0.06, requires_enhancer: true, load_requires_enhancer: true, enhancers: [3040], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.03, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 3386, tes: 3300, load_prob: 0.06, requires_enhancer: true, load_requires_enhancer: true, enhancers: [3080, 3156, 3233], enhancer_logic: additive, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 3640, tes: 3796, load_prob: 0.06, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.05, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
      - {tss: 4533, tes: 4373, load_prob: 0.06, requires_enhancer: false, load_requires_enhancer: false, initiation_prob: 0.5, pause_release_prob: 0.15, elongation_step_prob: 0.6, pause_offset: 0, termination_prob: 0.2}
