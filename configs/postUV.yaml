lef:
  chain_length: 800
  num_chains: 1
  # Must match preUV.yaml: preUV vs postUV is a transcription ON/OFF control, so
  # cohesin density and CTCF must be identical -- only RNAPII/E-P differs.
  separation: 120
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 100000
  chunk_size: 50
  seed: 1001
  max_rnapii: 0
  output_path: /home/ogulcan/polychrom/runs/postUV/LEFPositions.h5

  topology_kwargs:
    tad_positions: [200, 600]
    boundary_strength: 0.5
    release_prob: 0.0
    include_chromosome_ends: true

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate
    rnapii_load: null
    rnapii_translocate: null

viewer:
  lef_positions_path: /home/ogulcan/polychrom/runs/postUV/LEFPositions.h5
  output_path: /home/ogulcan/polychrom/runs/postUV/bridging_viewer.html
  max_frames: 10000
  bridge_cost: 1.0
  insulation_score_window: 50
  site_start: 0
  site_end: 800

polymer:
  lef_positions_path: /home/ogulcan/polychrom/runs/postUV/LEFPositions.h5
  output_folder: /home/ogulcan/polychrom/runs/postUV

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001

  density: 0.2
  pbc: false

  md_steps_per_block: 1270
  save_every_blocks: 10
  restart_every_blocks: 200

  initial_relaxation_steps: 500000
  pre_recording_steps: 100000

  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        restrict_nonbonded_to_chains: true
        replicate_ep_pairs_across_chains: true
        ep_pairs: []
        selective_attraction_energy: 0.0
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_per_chain: true
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: /home/ogulcan/polychrom/runs/postUV
  raw_output_path: /home/ogulcan/polychrom/runs/postUV/contact_map.npy
  oe_output_path: /home/ogulcan/polychrom/runs/postUV/contact_map_oe.npy
  viz_output_path: /home/ogulcan/polychrom/runs/postUV/contact_map_oe.png
  replicate_map_starts_across_chains: true
  map_starts: [0]
  map_size: 800
  cutoff: 2.0
  num_processes: 36
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 2000
        tol: 1.0e-6
        ignore_diagonals: 2
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        
