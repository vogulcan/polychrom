 fill="#1f2937">pos = TES</text><path d="M330.0,712.0 L330.0,790.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="268.3" y="741.0" width="123.4" height="20" rx="10.0" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="330.0" y="755.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">termination_prob</text><text x="40.0" y="860.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280">*  load_prob × enh_factor   (enh_factor applied only if load_requires_enhancer)</text><text x="40.0" y="882.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280">‡  release_prob = pause_release_prob × enh_factor (if requires_enhancer; 0 ⇒ stay PAUSED) × restraint (if a cohesin leg sits within rnapii_pause_restraint_window)</text><text x="40.0" y="904.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280" font-style="italic">Non-ELONGATING states are stationary blocks to cohesin; only ELONGATING can push a cohesin leg.</text></svg>