<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/></marker></defs><rect width="1080" height="600" fill="#ffffff"/><text x="540" y="34" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2937">Cohesin (per-leg) state machine</text><rect x="448.0" y="268.0" width="184" height="64" rx="12" fill="#0e7490" stroke="#155e75" stroke-width="2"/><text x="540.0" y="297.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="0.4">EXTRUDING</text><text x="540.0" y="315.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#f8fafc">steps out when target free</text><rect x="72.0" y="268.0" width="196" height="64" rx="12" fill="#6d28d9" stroke="#4c1d95" stroke-width="2"/><text x="170.0" y="297.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="0.4">CTCF-CAPTURED</text><text x="170.0" y="315.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#f8fafc">anchored</text><rect x="818.0" y="268.0" width="184" height="64" rx="12" fill="#b45309" stroke="#7c2d12" stroke-width="2"/><text x="910.0" y="297.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="0.4">STALLED</text><text x="910.0" y="315.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#f8fafc">obstacle ahead</text><circle cx="540" cy="96" r="8" fill="#1f2937"/><circle cx="540" cy="524" r="10" fill="none" stroke="#1f2937" stroke-width="2"/><circle cx="540" cy="524" r="4.5" fill="#1f2937"/><path d="M540.0,104.0 L540.0,268.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="450.5" y="176.0" width="179.0" height="20" rx="10.0" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="540.0" y="190.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">load_one / load_targeted</text><path d="M448.0,282.0 L268.0,282.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><text x="358.0" y="270.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#6b7280">ctcfCapture prob</text><path d="M268.0,318.0 L448.0,318.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><text x="358.0" y="336.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#6b7280">ctcfRelease prob</text><path d="M632.0,282.0 L818.0,282.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><text x="725.0" y="270.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#6b7280">target occupied</text><path d="M818.0,318.0 L632.0,318.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><text x="725.0" y="336.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#6b7280">target frees</text><path d="M170.0,332.0 Q297.4,484.9 494.0,516.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="240.4" y="475.4" width="114.1" height="19" rx="9.5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="297.4" y="488.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#1f2937">1/LIFETIME = 82t</text><path d="M540.0,332.0 L540.0,516.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="478.3" y="414.0" width="123.4" height="20" rx="10.0" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="540.0" y="428.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">1/LIFETIME = 82t</text><path d="M910.0,332.0 Q782.6,484.9 586.0,516.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="693.6" y="475.4" width="177.9" height="19" rx="9.5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="782.6" y="488.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#1f2937">1/LIFETIME_STALLED = 82t †</text><text x="40.0" y="562.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280">†  uses 1/LIFETIME_RNAPII_STALLED instead when the cohesin was stalled/pushed by RNAPII (rnapii_stalled flag).</text><text x="40.0" y="582.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280" font-style="italic">Each leg extrudes independently; on unload a fresh cohesin reloads to keep the count constant.</text></svg>