<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/></marker></defs><rect width="1060" height="720" fill="#ffffff"/><text x="530" y="34" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2937">DNA-lesion (UV-damage) state machine</text><text x="530.0" y="58.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" text-anchor="middle" fill="#6b7280" font-style="italic">Each lesion spawns with a fixed type, runs PRE-RECOGNITION -&gt; REPAIR -&gt; repaired, and the population is held at N // lesion_spacing by refill.</text><rect x="145.0" y="208.0" width="210" height="64" rx="12" fill="#d97706" stroke="#92400e" stroke-width="2"/><text x="250.0" y="237.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="0.4">PRE-RECOGNITION</text><text x="250.0" y="255.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#f8fafc">damage unmarked</text><circle cx="339.0" cy="224.0" r="11" fill="#ffffff" fill-opacity="0.9" stroke="#92400e"/><text x="339.0" y="228.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#92400e">0</text><rect x="145.0" y="438.0" width="210" height="64" rx="12" fill="#0891b2" stroke="#155e75" stroke-width="2"/><text x="250.0" y="467.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="0.4">REPAIR</text><text x="250.0" y="485.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#f8fafc">machinery bound</text><circle cx="339.0" cy="454.0" r="11" fill="#ffffff" fill-opacity="0.9" stroke="#155e75"/><text x="339.0" y="458.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#155e75">1</text><circle cx="250" cy="100" r="8" fill="#1f2937"/><circle cx="250" cy="640" r="10" fill="none" stroke="#1f2937" stroke-width="2"/><circle cx="250" cy="640" r="4.5" fill="#1f2937"/><path d="M250.0,108.0 L250.0,208.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="226.6" y="148.0" width="46.8" height="20" rx="10.0" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="250.0" y="162.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">spawn</text><path d="M250.0,272.0 L250.0,438.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="183.4" y="345.5" width="133.2" height="19" rx="9.5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="250.0" y="358.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#1f2937">recognise · 1/τ_pre</text><path d="M250.0,502.0 L250.0,632.0" fill="none" stroke="#1f2937" stroke-width="1.8" marker-end="url(#arrow)"/><rect x="193.0" y="557.5" width="114.1" height="19" rx="9.5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><text x="250.0" y="570.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#1f2937">repair · 1/τ_rep</text><path d="M355.0,228.0 Q419.0,240.0 355.0,252.0" fill="none" stroke="#1f2937" stroke-width="1.6" marker-end="url(#arrow)"/><text x="423.0" y="243.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">stay</text><path d="M355.0,458.0 Q419.0,470.0 355.0,482.0" fill="none" stroke="#1f2937" stroke-width="1.6" marker-end="url(#arrow)"/><text x="423.0" y="473.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">stay</text><text x="250.0" y="662.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" fill="#6b7280">repaired → removed</text><path d="M235,646 C95,560 95,200 235,106" fill="none" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow)"/><text x="96.0" y="374.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#6b7280">homeostatic</text><text x="96.0" y="388.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#6b7280">refill</text><rect x="565.0" y="107.0" width="470" height="86" rx="9" fill="#fdf4ff" stroke="#86198f" stroke-width="1.6"/><text x="800.0" y="137.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">Type assigned at spawn (fixed for life):</text><text x="800.0" y="154.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">in a gene body → Type A (p = type_a_prob) else Type B</text><text x="800.0" y="171.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#1f2937">off any gene body → always Type B</text><text x="568.0" y="226.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="start" fill="#1f2937">What each (type · state) does:</text><rect x="568" y="236" width="470" height="142" rx="9" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.4"/><text x="582.0" y="257.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">type · state</text><text x="765.4" y="257.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">blocks RNAPII</text><text x="897.0" y="257.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">stalls cohesin</text><line x1="578.0" y1="266" x2="1028.0" y2="266" stroke="#e5e7eb" stroke-width="1"/><text x="582.0" y="284.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">Type A · pre</text><text x="765.4" y="284.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#065f46">yes</text><text x="897.0" y="284.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#1f2937">via Pol II / intrinsic †</text><text x="582.0" y="311.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">Type B · pre</text><text x="765.4" y="311.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">no</text><text x="897.0" y="311.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">no</text><text x="582.0" y="338.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">Type A · repair</text><text x="765.4" y="338.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#065f46">yes</text><text x="897.0" y="338.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#065f46">yes ‡</text><text x="582.0" y="365.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="start" fill="#1f2937">Type B · repair</text><text x="765.4" y="365.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#065f46">yes</text><text x="897.0" y="365.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#065f46">yes ‡</text><rect x="568" y="392" width="470" height="177" rx="9" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.4"/><text x="580.0" y="412.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" text-anchor="start" fill="#1f2937">parameters  (symbolic — pass a config)</text><text x="580.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_spacing  (hold N // spacing)</text><text x="1026.0" y="432.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_type_a_prob</text><text x="1026.0" y="453.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="474.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_prerecognition_ticks  (τ_pre)</text><text x="1026.0" y="474.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="495.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_repair_ticks  (τ_rep)</text><text x="1026.0" y="495.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="516.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_block_prob</text><text x="1026.0" y="516.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="537.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_tad_size_exponent  (α)</text><text x="1026.0" y="537.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="580.0" y="558.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="normal" text-anchor="start" fill="#6b7280">lesion_tad_repair_exponent  (β)</text><text x="1026.0" y="558.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">—</text><text x="40.0" y="600.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="normal" text-anchor="start" fill="#6b7280">†  Type-A pre-recognition: a real stalled Pol II blocks cohesin when RNAPII is in the model; with no RNAPII the lesion stalls the leg itself (rnapii_stalled → fast eviction).</text><text x="40.0" y="620.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="normal" text-anchor="start" fill="#6b7280">‡  stalls an incoming cohesin leg with probability lesion_block_prob. A lesion-stalled Pol II is evicted when the lesion is repaired.</text><text x="40.0" y="644.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="start" fill="#6b7280" font-style="italic">Shorter TADs carry MORE lesions (placement ∝ L_TAD^(−α)) but recognise &amp; repair them FASTER (both rates × (L_mean / L_TAD)^β).</text></svg>