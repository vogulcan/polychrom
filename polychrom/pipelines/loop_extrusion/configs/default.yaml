# Default loop-extrusion pipeline config. Mirrors the example notebooks.
#
# Every "plugin" entry is either a string ("module:attr") or a mapping with
# `target` + `kwargs`. Override any of them to swap in custom mechanics.

lef:
  chain_length: 4000
  num_chains: 10
  separation: 800
  lifetime: 200
  lifetime_stalled: 200
  trajectory_length: 100000
  chunk_size: 50
  output_path: trajectory/LEFPositions.h5

  topology_kwargs:
    tad_positions: [300, 800, 1500, 2300, 2900, 3400]
    capture_prob: 0.9
    release_prob: 0.003
    symmetric: true

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:uniform_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate

polymer:
  lef_positions_path: trajectory/LEFPositions.h5
  output_folder: trajectory

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 0.03
  precision: mixed

  density: 0.1

  md_steps_per_block: 750
  save_every_blocks: 10
  restart_every_blocks: 100

  smc_bond_wiggle: 0.2
  smc_bond_dist: 0.5

  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:default_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: 1.5
        repulsive_trunc: 1.5
        repulsive_radius_mult: 1.05
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory
  raw_output_path: trajectory/contact_map.npy
  oe_output_path: trajectory/contact_map_oe.npy
  viz_output_path: trajectory/contact_map_oe.png
  map_starts: [0, 4000, 8000, 12000, 16000, 20000, 24000, 28000, 32000, 36000]
  map_size: 4000
  cutoff: 6.0
  num_processes: 6
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:observed_over_expected
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [13, 13]
        dpi: 150

# Interactive 1D viewer (standalone HTML). Runs after `lef`, before `polymer`
# in the `all` stage -- inspect the dynamics before paying for 3D MD.
viewer:
  lef_positions_path: trajectory/LEFPositions.h5
  output_path: trajectory/bridging_viewer.html
  max_frames: 1000
  bridge_cost: 1.0
  site_start: 600       # zoom like notebook cell 5 (no genes here -> no E-P panel)
  site_end: 1200
