# Minimal-but-high-quality smoke-test config.
#
# Single 800-monomer chain, 5 TAD CTCFs, ~13 LEFs.
# Trajectory: 3000 LEF steps -> 1000 saved 3D blocks (10 restarts x 100 saves).
# 3D MD: 200 OpenMM steps per block, density 0.15, error_tol 0.01.
# Contact map: 800x800 averaged over 1000 frames (5x more than v1).
# CPU end-to-end: ~5-6 minutes; produces a clean, near-publication-grade O/E map.

lef:
  chain_length: 800
  num_chains: 1
  separation: 60          # ~13 LEFs
  lifetime: 150           # longer residence -> sharper loop signal
  lifetime_stalled: 150
  trajectory_length: 3000
  chunk_size: 50
  output_path: trajectory_min/LEFPositions.h5

  topology_kwargs:
    tad_positions: [100, 250, 400, 550, 700]
    capture_prob: 0.95
    release_prob: 0.002    # ~500-step residence at CTCF
    symmetric: true

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:uniform_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate

polymer:
  lef_positions_path: trajectory_min/LEFPositions.h5
  output_folder: trajectory_min

  # CPU-friendly: no GPU required.
  platform: CPU
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 0.03
  precision: mixed

  density: 0.15

  # 3000 frames / 300 restart_every = 10 restarts.
  # 300 / 3 save_every = 100 saves per restart -> 1000 saved blocks total.
  md_steps_per_block: 200
  save_every_blocks: 3
  restart_every_blocks: 300

  smc_bond_wiggle: 0.2
  smc_bond_dist: 0.5

  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:default_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: 1.5
        repulsive_trunc: 1.5
        repulsive_radius_mult: 1.05
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory_min
  raw_output_path: trajectory_min/contact_map.npy
  oe_output_path: trajectory_min/contact_map_oe.npy
  viz_output_path: trajectory_min/contact_map_oe.png
  map_starts: [0]
  map_size: 800
  cutoff: 5.5             # midway -- fewer NaN pixels, still sharp
  num_processes: 4
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:observed_over_expected
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [10, 10]
        dpi: 150

# Interactive 1D viewer (standalone HTML), full 800-site lattice.
viewer:
  lef_positions_path: trajectory_min/LEFPositions.h5
  output_path: trajectory_min/bridging_viewer.html
  max_frames: 1000
  bridge_cost: 1.0
