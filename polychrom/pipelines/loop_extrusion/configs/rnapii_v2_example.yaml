# RNAPII v2 demo: POISED / PAUSED / ELONGATING state machine,
# sub-site elongation speed, per-gene enhancer-dependent pause release.
#
# Three genes with contrasting regulation:
#   gene 0 -- constitutive housekeeping (no enhancer required)
#   gene 1 -- enhancer-dependent, enhancer 450 kb downstream of TSS
#   gene 2 -- reverse strand, enhancer-dependent, weak pause release

lef:
  chain_length: 1600
  num_chains: 1
  separation: 60
  lifetime: 200
  lifetime_stalled: 200
  trajectory_length: 3000
  chunk_size: 50
  max_rnapii: 128
  output_path: trajectory_rnapii_v2/LEFPositions.h5

  topology_kwargs:
    tad_positions: [200, 500, 800, 1100, 1400]
    capture_prob: 0.95
    release_prob: 0.002
    symmetric: true
    genes:
      # gene 0 -- constitutive, fast initiation + release
      - tss: 250
        tes: 480
        load_prob: 0.05
        requires_enhancer: false
        initiation_prob: 0.3
        pause_release_prob: 0.3
        elongation_step_prob: 0.4    # ~50 bp/s at 1 kb/site, 8 s/tick
      # gene 1 -- enhancer-dependent, nearby enhancer 50 kb downstream
      # (within typical local cohesin loop span -> frequent contact -> elongation)
      - tss: 850
        tes: 1080
        load_prob: 0.05
        enhancer_pos: 900
        requires_enhancer: true
        initiation_prob: 0.3
        pause_release_prob: 0.5
        elongation_step_prob: 0.4
      # gene 2 -- reverse strand, enhancer-dependent, distant enhancer
      # (rarely contacted -> mostly PAUSED -- contrasts gene 1)
      - tss: 1380
        tes: 1140
        load_prob: 0.05
        enhancer_pos: 1200
        requires_enhancer: true
        initiation_prob: 0.2
        pause_release_prob: 0.2
        elongation_step_prob: 0.4
    rnapii_stall_prob: 0.4
    rnapii_push_prob: 0.25

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii

polymer:
  lef_positions_path: trajectory_rnapii_v2/LEFPositions.h5
  output_folder: trajectory_rnapii_v2
  platform: CPU
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 0.03
  precision: mixed
  density: 0.15
  md_steps_per_block: 200
  save_every_blocks: 3
  restart_every_blocks: 300
  smc_bond_wiggle: 0.2
  smc_bond_dist: 0.5
  max_data_length: 100
  overwrite: true
  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:default_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: 1.5
        repulsive_trunc: 1.5
        repulsive_radius_mult: 1.05
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory_rnapii_v2
  raw_output_path: trajectory_rnapii_v2/contact_map.npy
  oe_output_path: trajectory_rnapii_v2/contact_map_oe.npy
  viz_output_path: trajectory_rnapii_v2/contact_map_oe.png
  map_starts: [0]
  map_size: 1600
  cutoff: 5.5
  num_processes: 4
  verbose: true
  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:observed_over_expected
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [10, 10]
        dpi: 150
        title: "RNAPII v2 demo"
