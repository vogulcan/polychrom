# NRMCB 2024 supplementary box 1 -- exact translation.
#   "Enhancer selectivity in space and time: from enhancer-promoter
#    interactions to promoter activation", Nat. Rev. Mol. Cell Biol.
#    https://doi.org/10.1038/s41580-024-00710-6

lef:
  chain_length: 70000                # 70,000 lattice sites, 1 kb each
  num_chains: 1
  separation: 240                    # d = 240 kb
  lifetime: 150                      # lambda = 300 kb / 2 sites per step
  lifetime_stalled: 150
  trajectory_length: 12000           # 10,000 1D warmup + 2,000 sampled
  chunk_size: 50
  output_path: trajectory_paper/LEFPositions.h5

  topology_kwargs:
    n_pairs: 7
    ep_distance: 400                 # 400 kb intra-pair
    pair_spacing: 10000              # 10 Mb between adjacent pairs
    boundary_strength: 0.5           # Fig. 5
    convergent_orientation: true

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:ep_pair_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate

polymer:
  lef_positions_path: trajectory_paper/LEFPositions.h5
  output_folder: trajectory_paper

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed

  density: 0.2                       # 20% DNA volume fraction
  pbc: false                         # spherical confinement, not PBC

  md_steps_per_block: 1000
  save_every_blocks: 10
  restart_every_blocks: 200          # 2,000 sampled frames -> 10 restarts

  initial_relaxation_steps: 500000   # relax bare polymer before cohesin bonds
  pre_recording_steps: 500000        # equilibrate with cohesin before recording

  smc_bond_wiggle: 0.1               # delta = 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1             # k = 2 kT / delta^2, delta = 0.1
        angle_k: null                # paper specifies no angle term
        repulsion_energy: 50.0       # 50 kT
        repulsion_radius: 1.05       # 1.05 monomer
        attraction_energy: 0.0
        attraction_radius: 2.0       # 2 monomers
        selective_attraction_energy: 1.0   # 1 kT between E-P sticky pairs
        selective_repulsion_energy: 0.0
        confinement_density: 0.2
        confinement_k: 5.0
        sticky_particles: [
          4800,  5200,
          14800, 15200,
          24800, 25200,
          34800, 35200,
          44800, 45200,
          54800, 55200,
          64800, 65200,
        ]
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory_paper
  raw_output_path: trajectory_paper/contact_map.npy
  oe_output_path: trajectory_paper/contact_map_oe.npy
  viz_output_path: trajectory_paper/contact_map_oe.png
  # 800 kb window per E-P pair (400 kb pair + 200 kb upstream + 200 kb downstream)
  map_starts: [4600, 14600, 24600, 34600, 44600, 54600, 64600]
  map_size: 800
  cutoff: 5.0                        # = capture/interaction radius
  num_processes: 6
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:observed_over_expected
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        title: "NRMCB Suppl. Box 1: 7 E-P pairs, b=0.5"
