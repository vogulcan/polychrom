# Experiment 2 biophysical: same directional CTCF TADs + RNAPII dynamics.
# Matches experiment1_tads_only_biophysical.yaml except for genes/RNAPII and
# weak cognate E-P attraction. RNAPII is an explicit model extension; the
# supplement itself specifies loop extrusion, CTCF, E-P attraction, and polymer
# physics, not transcription-state dynamics.

lef:
  chain_length: 1600
  num_chains: 1
  separation: 240
  lifetime: 150
  lifetime_stalled: 150
  warmup_steps: 10000
  trajectory_length: 100000
  chunk_size: 50
  max_rnapii: 128
  seed: 1001
  output_path: trajectory_exp2_biophysical/LEFPositions.h5

  topology_kwargs:
    tad_positions: [200, 500, 800, 1100, 1400]
    boundary_strength: 0.8
    release_prob: 0.0
    include_chromosome_ends: true
    rnapii_stall_prob: 0.4
    rnapii_push_prob: 0.25
    ep_contact_tolerance: 10
    genes:
      # TAD0 [0, 200]
      - {tss: 30,   tes: 90,   load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 170,  tes: 110,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 30,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD1 [200, 500]
      - {tss: 230,  tes: 320,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 470,  tes: 380,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 230,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD2 [500, 800]
      - {tss: 530,  tes: 620,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 770,  tes: 680,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 530,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD3 [800, 1100]
      - {tss: 830,  tes: 920,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1070, tes: 980,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 830,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD4 [1100, 1400]
      - {tss: 1130, tes: 1220, load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1370, tes: 1280, load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 1130,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD5 [1400, 1600]
      - {tss: 1430, tes: 1490, load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1570, tes: 1510, load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 1430,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_convergent_tad_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii

viewer:
  lef_positions_path: trajectory_exp2/LEFPositions.h5
  output_path: trajectory_exp2/bridging_viewer.html
  max_frames: 10000
  bridge_cost: 1.0

polymer:
  lef_positions_path: trajectory_exp2_biophysical/LEFPositions.h5
  output_folder: trajectory_exp2_biophysical

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.01
  collision_rate: 1.0
  precision: mixed
  seed: 2001

  density: 0.2
  pbc: false

  md_steps_per_block: 1000
  save_every_blocks: 10
  restart_every_blocks: 200

  initial_relaxation_steps: 500000
  pre_recording_steps: 500000

  smc_bond_wiggle: 0.1
  smc_bond_dist: 1.0
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:paper_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: null
        repulsion_energy: 50.0
        repulsion_radius: 1.05
        attraction_energy: 0.0
        attraction_radius: 2.0
        selective_attraction_energy: 1.0
        selective_repulsion_energy: 0.0
        ep_pairs:
          - [30, 170]
          - [230, 470]
          - [530, 770]
          - [830, 1070]
          - [1130, 1370]
          - [1430, 1570]
        confinement_density: 0.2
        confinement_k: 5.0
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory_exp2_biophysical
  raw_output_path: trajectory_exp2_biophysical/contact_map.npy
  oe_output_path: trajectory_exp2_biophysical/contact_map_oe.npy
  viz_output_path: trajectory_exp2_biophysical/contact_map_oe.png
  map_starts: [0]
  map_size: 1600
  cutoff: 5.0
  num_processes: 6
  verbose: true

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:balanced_observed_over_expected
      kwargs:
        max_iter: 200
        tol: 1.0e-6
        ignore_diagonals: 1
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        title: "Exp2 biophysical: TADs + RNAPII + E-P attraction (ICE O/E)"
