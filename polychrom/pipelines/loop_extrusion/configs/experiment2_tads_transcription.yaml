# Experiment 2: same TAD layout + dense active transcription.
# 12 genes (2 per TAD, one forward + one reverse). Forward genes are
# constitutive; reverse genes are enhancer-dependent with their enhancer
# at the paired forward gene's TSS (intra-TAD looping). Uses the v2
# state-machine RNAPII plugin (POISED / PAUSED / ELONGATING) with
# paper-realistic elongation speed (~50 bp/s).
#
# CUDA, ~5-6 min on RTX 3070 Ti.

lef:
  chain_length: 1600
  num_chains: 1
  separation: 50
  lifetime: 200
  lifetime_stalled: 200
  trajectory_length: 8000
  chunk_size: 50
  max_rnapii: 128
  output_path: trajectory_exp2/LEFPositions.h5

  topology_kwargs:
    tad_positions: [200, 500, 800, 1100, 1400]
    capture_prob: 0.95
    release_prob: 0.002
    symmetric: true
    rnapii_stall_prob: 0.4
    rnapii_push_prob: 0.25
    ep_contact_tolerance: 10
    genes:
      # TAD0 [0, 200]
      - {tss: 30,   tes: 90,   load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 170,  tes: 110,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 30,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD1 [200, 500]
      - {tss: 230,  tes: 320,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 470,  tes: 380,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 230,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD2 [500, 800]
      - {tss: 530,  tes: 620,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 770,  tes: 680,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 530,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD3 [800, 1100]
      - {tss: 830,  tes: 920,  load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1070, tes: 980,  load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 830,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD4 [1100, 1400]
      - {tss: 1130, tes: 1220, load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1370, tes: 1280, load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 1130,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      # TAD5 [1400, 1600]
      - {tss: 1430, tes: 1490, load_prob: 0.04, requires_enhancer: false,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}
      - {tss: 1570, tes: 1510, load_prob: 0.04, requires_enhancer: true,
         enhancer_pos: 1430,
         initiation_prob: 0.3, pause_release_prob: 0.5,
         elongation_step_prob: 0.4, pause_offset: 1}

  plugins:
    topology:
      target: polychrom.pipelines.loop_extrusion.plugins.topology:gene_aware_topology
    load:        polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:load_one
    unload_prob: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:unload_prob
    capture:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:capture
    release:     polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:release
    translocate: polychrom.pipelines.loop_extrusion.plugins.lef_dynamics:translocate_with_rnapii
    rnapii_load:        polychrom.pipelines.loop_extrusion.plugins.rnapii:load_rnapii
    rnapii_translocate: polychrom.pipelines.loop_extrusion.plugins.rnapii:stateful_translocate_rnapii

# Interactive 1D viewer. Genes carry enhancer_pos -> the E-P proximity panel
# shows the effective enhancer-promoter distance shrinking as loops bracket
# the pair. Runs after `lef`, before `polymer`.
viewer:
  lef_positions_path: trajectory_exp2/LEFPositions.h5
  output_path: trajectory_exp2/bridging_viewer.html
  max_frames: 1000
  bridge_cost: 1.0

polymer:
  lef_positions_path: trajectory_exp2/LEFPositions.h5
  output_folder: trajectory_exp2

  platform: cuda
  gpu: "0"
  integrator: variableLangevin
  error_tol: 0.005
  collision_rate: 0.03
  precision: mixed

  density: 0.15
  pbc: true

  md_steps_per_block: 750
  save_every_blocks: 10
  restart_every_blocks: 400

  smc_bond_wiggle: 0.2
  smc_bond_dist: 0.5
  max_data_length: 100
  overwrite: true

  plugins:
    force_builder:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:default_force_builder
      kwargs:
        bond_length: 1.0
        bond_wiggle: 0.1
        angle_k: 1.5
        repulsive_trunc: 1.5
        repulsive_radius_mult: 1.05
    initial_conformation:
      target: polychrom.pipelines.loop_extrusion.plugins.forces:grow_cubic_conformation

contacts:
  trajectory_folder: trajectory_exp2
  raw_output_path: trajectory_exp2/contact_map.npy
  oe_output_path: trajectory_exp2/contact_map_oe.npy
  viz_output_path: trajectory_exp2/contact_map_oe.png
  map_starts: [0]
  map_size: 1600
  cutoff: 5.5
  num_processes: 6
  verbose: false

  plugins:
    sampler:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:monomer_resolution_sampler
    obs_over_exp:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:observed_over_expected
    viz:
      target: polychrom.pipelines.loop_extrusion.plugins.sampling:default_oe_heatmap
      kwargs:
        log: true
        cmap: coolwarm
        vmin: -1.0
        vmax: 1.0
        figsize: [12, 12]
        dpi: 150
        title: "Exp2: TADs + dense transcription"
